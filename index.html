<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESTEL</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Futura, "Futura PT", "Futura Std", "Avenir Next", Helvetica, Arial, sans-serif;
    }

    a.page-link {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 8vw;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>
  <a class="page-link" href="./estel.html">
    <img src="./download.gif" class="bg" alt="ESTEL" />
    <div class="title">ESTEL</div>
  </a>
</body>
</html>
